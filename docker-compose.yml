version: '3.8'

services:
  mongodb:
    image: mongo:7
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  bot:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - MONGODB_URI=mongodb://mongodb:27017
      - DATABASE_NAME=invite_bot
      - OWNER_ID=${OWNER_ID}
      - LOG_CHANNEL=${LOG_CHANNEL}
      - PORT=8000
    depends_on:
      - mongodb

volumes:
  mongodb_data:
